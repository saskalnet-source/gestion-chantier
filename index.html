<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KAL NET - Recherche chantiers</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>KAL NET</h1>
      <p>Recherche chantier / agent avec téléphone direct</p>
    </div>
    <button id="manageAgentsBtn" class="btn secondary">Agents</button>
  </header>

  <main class="container">
    <section class="search-card">
      <label for="searchInput">Recherche</label>
      <input id="searchInput" type="search" placeholder="Tapez une adresse, un client ou un agent..." autocomplete="off">
      <p id="status" class="status">Chargement Firebase...</p>
      <div class="actions center">
        <button id="addChantierBtn" class="btn">+ Ajouter un chantier</button>
        <button id="importBtn" class="btn secondary">Importer une liste de chantiers</button>
        <button id="exportBtn" class="btn secondary">Exporter CSV</button>
        <button id="seedBtn" class="btn warning">Réparer / réimporter les adresses</button>
        <input id="importFile" type="file" accept=".xlsx,.xls,.csv,.txt" hidden>
      </div>
    </section>

    <section id="emptyHelp" class="help-card">
      <h2>Commencez par une recherche</h2>
      <p>Les chantiers ne s'affichent pas tous. Tapez une adresse, un client ou un agent pour voir les résultats.</p>
    </section>

    <section id="results" class="results"></section>
  </main>

  <dialog id="chantierDialog" class="dialog">
    <form method="dialog" id="chantierForm">
      <h2 id="chantierDialogTitle">Ajouter un chantier</h2>
      <input type="hidden" id="chantierId">
      <div class="grid">
        <label>Adresse du chantier
          <input id="adresse" required placeholder="Ex : 92 avenue de la République">
        </label>
        <label>CP / Ville
          <input id="cp" placeholder="Ex : 75017 ou Vincennes">
        </label>
        <label>Client
          <input id="client" placeholder="Ex : HNET">
        </label>
        <label>Poubelle
          <select id="poubelle"></select>
        </label>
        <label>Ménage
          <select id="menage"></select>
        </label>
        <label>Gardiennage
          <select id="gardiennage"></select>
        </label>
      </div>
      <div class="dialog-actions">
        <button value="cancel" class="btn secondary" type="button" id="cancelChantierBtn">Annuler</button>
        <button class="btn" type="submit">Enregistrer</button>
      </div>
    </form>
  </dialog>

  <dialog id="agentsDialog" class="dialog wide">
    <div>
      <h2>Gestion des agents</h2>
      <form id="agentForm" class="agent-form">
        <input type="hidden" id="agentId">
        <label>Nom de l'agent
          <input id="agentName" required placeholder="Ex : DEMBA DOUCOURÉ">
        </label>
        <label>Téléphone
          <input id="agentPhone" placeholder="Ex : 06 12 34 56 78">
        </label>
        <button class="btn" type="submit">Enregistrer agent</button>
      </form>
      <div id="agentsList" class="agents-list"></div>
      <div class="dialog-actions">
        <button class="btn secondary" id="closeAgentsBtn">Fermer</button>
      </div>
    </div>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
